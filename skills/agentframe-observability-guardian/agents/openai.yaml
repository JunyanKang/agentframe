interface:
  display_name: "AgentFrame Observability Guardian"
  short_description: "Design logs, telemetry, diagnostics, error reporting, run metadata, and supportability evidence"
  default_prompt: "Use $agentframe-observability-guardian. First inspect repository instructions, source-of-truth files, and affected validation surfaces. Produce the required governance or engineering artifact with explicit gates and evidence. Do not change unrelated files or bypass human-review requirements. Hand off or Stop when this surface is blocked or complete."

policy:
  allow_implicit_invocation: true
