interface:
  display_name: "AgentFrame Observability Guardian"
  short_description: "Design logs, telemetry, diagnostics, error reporting, run metadata, and supportability evidence"
  default_prompt: "Use $agentframe-observability-guardian. First inspect logs, metrics, traces, diagnostics, error reporting, health checks, run metadata, support evidence, and sensitive data exposure risk. Produce an observability or performance investigation with evidence, instrumentation requirements, validation steps, and supportability gaps. Do not add noisy telemetry, log secrets, guess causes without evidence, or change unrelated files. Hand off or Stop when diagnostic evidence is blocked or complete."

policy:
  allow_implicit_invocation: false
