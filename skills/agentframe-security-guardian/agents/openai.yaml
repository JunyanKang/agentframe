interface:
  display_name: "AgentFrame Security Guardian"
  short_description: "Review auth, secrets, permissions, trust boundaries, sandboxing, input validation, and security-sensitive workflows"
  default_prompt: "Use $agentframe-security-guardian. First inspect repository instructions, source-of-truth files, and affected validation surfaces. Produce the required governance or engineering artifact with explicit gates and evidence. Do not change unrelated files or bypass human-review requirements. Hand off or Stop when this surface is blocked or complete."

policy:
  allow_implicit_invocation: true
