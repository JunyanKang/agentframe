interface:
  display_name: "AgentFrame Frontend Experience Guardian"
  short_description: "Review frontend UX states, accessibility, responsive behavior, visual QA, interactions, and user-facing error recovery"
  default_prompt: "Use $agentframe-frontend-experience-guardian. First inspect repository instructions, source-of-truth files, and affected validation surfaces. Produce the required governance or engineering artifact with explicit gates and evidence. Do not change unrelated files or bypass human-review requirements. Hand off or Stop when this surface is blocked or complete."

policy:
