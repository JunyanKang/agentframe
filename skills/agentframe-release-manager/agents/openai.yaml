interface:
  display_name: "AgentFrame Release Manager"
  short_description: "Plan, validate, publish, and document releases with versions, tags, assets, changelogs, and rollback paths"
  default_prompt: "Use $agentframe-release-manager. First inspect repository instructions, source-of-truth files, and affected validation surfaces. Produce the required governance or engineering artifact with explicit gates and evidence. Do not change unrelated files or bypass human-review requirements. Hand off or Stop when this surface is blocked or complete."

policy:
  allow_implicit_invocation: false
