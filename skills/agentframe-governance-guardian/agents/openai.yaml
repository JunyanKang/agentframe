interface:
  display_name: "AgentFrame Governance Guardian"
  short_description: "Guard source-of-truth policy, AGENTS layers, routing, validators, and framework consistency"
  default_prompt: "Use $agentframe-governance-guardian. First inspect repository instructions, source-of-truth files, and affected validation surfaces. Produce the required governance or engineering artifact with explicit gates and evidence. Do not change unrelated files or bypass human-review requirements. Hand off or Stop when this surface is blocked or complete."

policy:
  allow_implicit_invocation: false
