interface:
  display_name: "AgentFrame Governance Guardian"
  short_description: "Guard source-of-truth policy, AGENTS layers, routing, validators, and framework consistency"
  default_prompt: "Use $agentframe-governance-guardian. First inspect AGENTS.md layers, .codex policy files, source-of-truth mappings, routing rules, validators, framework-local skill copies, installable skill names, and public lifecycle tooling. Produce a governance consistency report with drift risks, required synchronized edits, validation gates, and human-review items. Do not rename skills, delete skills, weaken source-of-truth checks, or change unrelated files. Hand off or Stop when governance consistency is blocked or complete."

policy:
  allow_implicit_invocation: false
