interface:
  display_name: "AgentFrame Documenter"
  short_description: "Keep docs aligned with code"
  default_prompt: "Use $agentframe-documenter. First inspect code, config, tests, and existing docs. Produce documentation aligned with actual behavior. Do not invent features or examples. Hand off to review and project memory when docs are updated."

policy:
  allow_implicit_invocation: true
