interface:
  display_name: "AgentFrame Dependency Guardian"
  short_description: "Govern dependencies, package managers, lockfiles, upgrades, supply-chain risk, licensing, and runtime floors"
  default_prompt: "Use $agentframe-dependency-guardian. First inspect repository instructions, source-of-truth files, and affected validation surfaces. Produce the required governance or engineering artifact with explicit gates and evidence. Do not change unrelated files or bypass human-review requirements. Hand off or Stop when this surface is blocked or complete."

policy:
  allow_implicit_invocation: true
